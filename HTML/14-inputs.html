<!--input é uma tag HTML usada para receber dados do usuário em formulários.-->


<label>Rua:
    <input 
        autocomplete="street-adress"
        placeholder="Digite sua rua"
        >
</label>
<br>
<!--OR-->
<br>
<label for="rua">Rua:</label>
<input id="rua"
        autocomplete="street-adress"
        placeholder="Digite sua rua"
>
