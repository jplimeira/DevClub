<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Aula !important</h1>
    <Style>
        /*Por ser cascata e priorizar a última "ordem",
        o normal seria a cor do h1 ser azul, mas ao aplicar o 
        !important no vermelho, prioriza o vermelho, que se
        torna prioridade! */
        h1 {
            color:red !important;
            color:blue;
        }
    </Style>
</body>
</html>
